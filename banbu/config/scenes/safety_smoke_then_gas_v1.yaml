scene_id: safety_smoke_then_gas_v1
name: Dual alarm - smoke then gas
kind: sequential

trigger:
  steps:
    - device: "0xa4c138a7419cff49"        # PA-44Z smoke detector local_id=11
      field: payload.smoke
      transition: "false->true"
    - device: "0xa4c13864ef9786ad"        # ZG-225Z gas sensor local_id=9
      field: payload.gas
      transition: "false->true"
      within_seconds: 10

context_devices:
  trigger:
    - "0xa4c138a7419cff49"
    - "0xa4c13864ef9786ad"
  context_only: []

preconditions: []

intent: Fire alarm when smoke and gas both trigger within 10s

actions_hint:
  - tool: execute_plan
    args:
      device: "0xa4c138a6b14a7692"
      action: alarm_fire

policy:
  cooldown_seconds: 300
  inflight_seconds: 60
  priority: 10
