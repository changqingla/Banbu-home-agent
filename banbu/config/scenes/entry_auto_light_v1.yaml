scene_id: entry_auto_light_v1
name: Entry auto light
kind: sequential

trigger:
  steps:
    - device: "0xa4c138c1dfcc3e7e"        # door sensor (TS0203)
      field: payload.contact
      transition: "true->false"           # closed → open
    - device: "0xa4c1384addf12b0c"        # PIR (IH012-RT02)
      field: payload.occupancy
      transition: "false->true"
      within_seconds: 30

context_devices:
  trigger:
    - "0xa4c138c1dfcc3e7e"
    - "0xa4c1384addf12b0c"
  context_only:
    - "0xa4c138d2ceca243c"        # presence radar with illuminance
    - "0xa4c1388ce42078b7"        # target color temperature light

preconditions:
  - device: "0xa4c138d2ceca243c"
    field: payload.illuminance
    op: lt
    value: 30
    on_missing: skip
  - device: "0xa4c1388ce42078b7"
    field: payload.state
    op: neq
    value: "ON"
    on_missing: skip

intent: Turn on the entry light when entry is detected, the environment is dark, and the light is off

actions_hint:
  - tool: execute_plan
    args:
      device: "0xa4c1388ce42078b7"
      action: turn_on

policy:
  cooldown_seconds: 60
  inflight_seconds: 30
  priority: 5
